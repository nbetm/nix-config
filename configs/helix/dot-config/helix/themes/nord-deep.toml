# Nord Deep theme for Helix
# An arctic, north-bluish color palette taken to deeper depths

# Syntax highlighting ---------------------------------------------------------

"attribute" = "fg"

"boolean" = "navy"

"type" = "aqua"
"type.builtin" = "aqua"
"type.enum.variant" = "aqua"
"type.parameter" = "aqua"

"constructor" = "aqua"

"constant" = "fg"
"constant.builtin" = "navy"
"constant.language" = "navy"
"constant.character" = "yellow"
"constant.numeric" = "magenta"

"string" = "green"
"string.regexp" = "yellow"
"string.special" = "green"
"string.special.url" = "cyan"

"comment" = { fg = "grey1", modifiers = ["italic"] }
"comment.error"   = { fg = "red",    modifiers = ["bold"] } # FIXME
"comment.warning" = { fg = "yellow", modifiers = ["bold"] } # WARN
"comment.todo"    = { fg = "blue",   modifiers = ["bold"] } # TODO
"comment.note"    = { fg = "navy",   modifiers = ["bold"] } # NOTE

"variable" = "fg"
"variable.builtin" = "fg"
"variable.other.member" = "aqua"
"variable.other.member.private" = { fg = "fg", modifiers = ["italic"] }
"variable.parameter" = "fg"

"label" = "blue"

"operator" = "blue"

"function" = "cyan"
"function.builtin" = "cyan"
"function.macro" = "cyan"
"function.method" = "cyan"
"function.method.private" = { fg = "cyan", modifiers = ["italic"] }
"function.special" = "cyan"

"tag" = "blue"
"tag.builtin" = "blue"

"punctuation" = "fg"
"punctuation.bracket" = "blue"
"punctuation.delimiter" = "blue"
"punctuation.special" = "blue"

"keyword" = "blue"
"keyword.control" = "blue"
"keyword.directive" = "navy" # preprocessor / pragmas (Nord nord10)
"keyword.function" = "blue"
"keyword.operator" = "blue"
"keyword.storage" = "blue"

"namespace" = "fg"

"special" = "cyan"

"diff.delta" = "yellow"
"diff.minus" = "red"
"diff.plus" = "green"

"markup.heading.1" = { fg = "magenta", modifiers = ["bold"] }
"markup.heading.2" = { fg = "magenta", modifiers = ["bold"] }
"markup.heading.3" = { fg = "magenta", modifiers = ["bold"] }
"markup.heading.4" = { fg = "magenta", modifiers = ["bold"] }
"markup.heading.5" = { fg = "magenta", modifiers = ["bold"] }
"markup.heading.6" = { fg = "magenta", modifiers = ["bold"] }
"markup.bold" = { fg = "fg", modifiers = ["bold"] }
"markup.italic" = { fg = "fg", modifiers = ["italic"] }
"markup.link.label" = { fg = "cyan", modifiers = ["underlined"] }
"markup.link.text" = "cyan"
"markup.link.url" = { fg = "cyan", modifiers = ["underlined"] }
"markup.list" = "blue"
"markup.list.checked" = "green"
"markup.list.unchecked" = "grey1"
"markup.quote" = { fg = "grey1", modifiers = ["italic"] }
"markup.raw" = "aqua"
"markup.strikethrough" = { fg = "fg", modifiers = ["crossed_out"] }

# UI --------------------------------------------------------------------------

"ui.background" = { fg = "fg", bg = "bg" }
"ui.background.separator" = { fg = "bg3" }

"ui.linenr" = { fg = "grey0" }
"ui.linenr.selected" = { fg = "grey2" }

"ui.statusline" = { fg = "fg", bg = "bg1" }
"ui.statusline.inactive" = { fg = "grey1", bg = "bg1" }
"ui.statusline.insert" = { fg = "bg", bg = "cyan" }
"ui.statusline.normal" = { fg = "bg", bg = "fg" }
"ui.statusline.select" = { fg = "bg", bg = "magenta" }
"ui.statusline.separator" = { fg = "bg3" }

"ui.menu" = { fg = "fg", bg = "bg" }
"ui.menu.scroll" = { fg = "bg3" }
"ui.menu.selected" = { fg = "cyan", bg = "bg3" }

"ui.popup" = { fg = "grey1", bg = "bg" }
"ui.popup.info" = { fg = "grey1", bg = "bg" }

"ui.help" = { fg = "grey1", bg = "bg" }
"ui.window" = { fg = "bg3" }

"ui.bufferline" = { fg = "grey1", bg = "bg1" }
"ui.bufferline.active" = { fg = "fg", bg = "bg" }
"ui.bufferline.background" = { bg = "bg1" }

"ui.text" = "fg"
"ui.text.directory" = { fg = "blue" }
"ui.text.focus" = { fg = "fg", bg = "bg3" }
"ui.text.inactive" = { fg = "grey1" }
"ui.text.info" = { fg = "fg" }

"ui.virtual" = "grey1"
"ui.virtual.indent-guide" = "bg3"
"ui.virtual.inlay-hint" = { fg = "grey1", modifiers = ["italic"] }
"ui.virtual.inlay-hint.parameter" = { fg = "grey1", modifiers = ["italic"] }
"ui.virtual.inlay-hint.type" = { fg = "grey1", modifiers = ["italic"] }
"ui.virtual.jump-label" = { fg = "cyan", modifiers = ["bold"] }
"ui.virtual.ruler" = { bg = "cursorline" }
"ui.virtual.wrap" = "grey1"

"ui.cursor" = { bg = "bg2" }
"ui.cursor.primary" = { fg = "bg", bg = "fg" }
"ui.cursor.match" = { fg = "orange", modifiers = ["bold"] }

"ui.cursor.primary.normal" = { fg = "bg", bg = "fg" }
"ui.cursor.primary.insert" = { fg = "bg", bg = "fg" }
"ui.cursor.primary.select" = { fg = "bg", bg = "fg" }

"ui.cursor.normal" = { fg = "bg", bg = "grey1" }
"ui.cursor.insert" = { fg = "bg", bg = "grey1" }
"ui.cursor.select" = { fg = "bg", bg = "grey1" }

"ui.cursorcolumn.primary" = { bg = "bg1" }
"ui.cursorcolumn.secondary" = { bg = "bg1" }

"ui.cursorline.primary" = { bg = "cursorline" }
"ui.cursorline.secondary" = { bg = "cursorline" }

"ui.selection" = { bg = "bg2" }
"ui.selection.primary" = { bg = "bg2" }

"ui.highlight" = { fg = "bg", bg = "yellow" }

"ui.picker.header" = { fg = "fg", modifiers = ["bold"] }
"ui.picker.header.column" = { fg = "fg", modifiers = ["bold"] }
"ui.picker.header.column.active" = { fg = "cyan", modifiers = ["bold"] }

"ui.gutter" = { fg = "bg3" }
"ui.gutter.selected" = { fg = "fg" }

"diagnostic.deprecated" = { fg = "grey1", modifiers = ["crossed_out"] }
"diagnostic.error" = { underline = { color = "red", style = "curl" } }
"diagnostic.hint" = { underline = { color = "navy", style = "curl" } }
"diagnostic.info" = { underline = { color = "navy", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.warning" = { underline = { color = "yellow", style = "curl" } }

error = { fg = "red", modifiers = ["italic"] }
warning = { fg = "yellow", modifiers = ["italic"] }
info = { fg = "navy", modifiers = ["italic"] }
hint = { fg = "navy", modifiers = ["italic"] }

[palette]
# palette1: polar night (neutral surfaces)
bg = "#212732"
bg1 = "#2e3440"
bg2 = "#3b4252"
bg3 = "#434c5e"

# palette1: washes (channel-tinted row backgrounds, 10% channel over bg)
wash_red = "#39313c"
wash_orange = "#323138"
wash_yellow = "#313439"
wash_green = "#2d353a"
wash_magenta = "#30313e"
wash_blue = "#2b3340"
wash_navy = "#2b3443"

# palette1: deeps (saturated pill backgrounds, paired with fg_bright)
deep_red = "#82515b"
deep_orange = "#785751"
deep_yellow = "#665f50"
deep_green = "#556356"
deep_magenta = "#6a5a70"
deep_blue = "#4e6075"
deep_navy = "#4b617d"

# palette2: default / emphasis foregrounds
fg = "#b8c5d1"
fg_bright = "#d4dce6"

# palette2: greys (de-emphasis foregrounds)
grey0 = "#5d6478"
grey1 = "#798094"
grey2 = "#929aae"

# palette2: frost (structural syntax)
aqua = "#8fbcbb"
cyan = "#88c0d0"
blue = "#81a1c1"
navy = "#6c8eb8"

# palette2: aurora (semantic syntax)
red = "#c97078"
orange = "#d08770"
yellow = "#ebcb8b"
green = "#a3be8c"
magenta = "#b48ead"

# Derived: editor-buffer cursorline (50/50 blend of bg and bg1).
cursorline = "#282e39"
