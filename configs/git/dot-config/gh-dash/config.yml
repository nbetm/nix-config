# GH-Dash UI Config
# https://www.gh-dash.dev/configuration
---
prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: true
    width: 120
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  universal: []
  issues: []
  prs:
    - key: O
      name: open in octo
      command: nvim -c "Octo pr list"
      prs:
    - key: M
      name: enable auto-merge and squash
      command: gh pr merge --auto --squash --repo {{.RepoName}} {{.PrNumber}}
    - key: U
      name: update (rebase)
      command: >
        gh pr update-branch --rebase {{.PrNumber}} --repo {{.RepoName}}
  branches: []
repoPaths: {}
theme:
  ui:
    table:
      sectionsShowCount: true
      showSeparators: true
      compact: false
  # Nord Deep
  colors:
    text:
      primary: "#b8c5d1"
      secondary: "#929aae"
      inverted: "#212732"
      faint: "#798094"
      warning: "#ebcb8b"
      success: "#a3be8c"
      error: "#c97078"
      actor: "#929aae"
    background:
      selected: "#3b4252"
    border:
      primary: "#434c5e"
      secondary: "#434c5e"
      faint: "#3b4252"
    icon:
      newcontributor: "#a3be8c"
      contributor: "#8fbcbb"
      collaborator: "#8fbcbb"
      member: "#88c0d0"
      owner: "#b48ead"
      unknownrole: "#798094"
pager:
  diff: ""
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
