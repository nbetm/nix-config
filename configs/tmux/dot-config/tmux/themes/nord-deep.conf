# vim: set ft=tmux :

# palette1: polar night
set -gq @bg "#212732"
set -gq @bg1 "#2e3440"
set -gq @bg2 "#3b4252"
set -gq @bg3 "#434c5e"

# palette1: washes (10% channel over bg)
set -gq @wash_red "#39313c"
set -gq @wash_orange "#323138"
set -gq @wash_yellow "#313439"
set -gq @wash_green "#2d353a"
set -gq @wash_magenta "#30313e"
set -gq @wash_blue "#2b3340"
set -gq @wash_indigo "#2e3445"
set -gq @wash_navy "#2b3443"

# palette1: deeps (saturated pill bgs paired with fg_bright)
set -gq @deep_red "#82515b"
set -gq @deep_orange "#785751"
set -gq @deep_yellow "#665f50"
set -gq @deep_green "#556356"
set -gq @deep_magenta "#6a5a70"
set -gq @deep_blue "#4e6075"
set -gq @deep_indigo "#5a5d83"
set -gq @deep_navy "#4b617d"

# palette2: foregrounds
set -gq @fg "#b8c5d1"
set -gq @fg_bright "#d4dce6"
set -gq @grey0 "#5d6478"
set -gq @grey1 "#798094"
set -gq @grey2 "#929aae"

# palette2: frost
set -gq @aqua "#8fbcbb"
set -gq @cyan "#88c0d0"
set -gq @blue "#81a1c1"
set -gq @navy "#6c8eb8"
set -gq @indigo "#9090d0"

# palette2: aurora
set -gq @red "#c97078"
set -gq @orange "#d08770"
set -gq @yellow "#ebcb8b"
set -gq @green "#a3be8c"
set -gq @magenta "#b48ead"

# Session module: <session> — green normally, yellow when prefix held.
# Conditional at format level (tmux doesn't evaluate #{?...} inside style attribute values).
set -gF @opt_status_session "##{?client_prefix,#[fg=#{@yellow}##,bold],#[fg=#{@green}##,bold]}󰕮 ##S "

# Time module: Wed May 6 19:22
set -gF @opt_status_time "#[fg=#{@fg}] %a %b %-d  %H:%M"

set -gF status-style "fg=#{@fg},bg=#{@bg1}"

# Message
set -gF message-style "fg=#{@yellow},bg=#{@bg1},align=centre"
set -gF message-command-style "fg=#{@yellow},bg=#{@bg1},align=centre"

# Panes
set -wgF pane-active-border-style "#{?pane_in_mode,fg=#{@cyan},#{?pane_synchronized,fg=#{@aqua},fg=#{@cyan}}}"
set -wgF pane-border-style "fg=#{@bg3}"
set -wgF display-panes-colour "#{@grey1}"
set -wgF display-panes-active-colour "#{@cyan}"

# Popups & Menu (tmux 3.4+)
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "fg=#{@fg},bg=#{@bg2}"
  set -gF popup-style "bg=#{@bg},fg=#{@fg}"
  set -gF popup-border-style "fg=#{@bg3}"
%endif

# Copy mode (selection)
set -gF mode-style "bg=#{@bg2}"

# Clock mode
set -gF clock-mode-colour "#{@navy}"

# Activity/bell styles — explicitly neutralized (the persistent yellow icon does the signaling;
# without these, tmux retains a previously-set style across re-sources)
set -gF window-status-activity-style "fg=default,bg=default,noreverse,nounderscore"
set -gF window-status-bell-style "fg=default,bg=default,noreverse,nounderscore"

# Window flags — no style override, icons inherit fg from the surrounding window-status
# format (text on inactive, cyan/orange on active). Icon shape carries the signal.
set -gqF @opt_window_flags "##{?window_activity_flag, 󱅫,}"
set -agqF @opt_window_flags "##{?window_bell_flag, 󰂞,}"
set -agqF @opt_window_flags "##{?window_silence_flag, 󰂛,}"
set -agqF @opt_window_flags "##{?window_last_flag, 󰁯,}"
set -agqF @opt_window_flags "##{?window_marked_flag, 󰃀,}"
set -agqF @opt_window_flags "##{?window_zoomed_flag, 󰁌,}"

# Window content tokens
set -gq @opt_window_text "#W"
set -gq @opt_window_number "#I"
set -gq @opt_window_current_text "#W"
set -gq @opt_window_current_number "#I"

# Window status separator
set -gF window-status-separator "#[fg=#{@grey1}] ┊ "

# Inactive window
set -gF window-status-format "#[fg=#{@grey2}]#{@opt_window_number}:#{@opt_window_text}#{@opt_window_flags}"

# Active window: cyan fg + bold (orange when panes synchronized)
# Conditional at format level — same reason as session module above.
# Inner commas in #[] escaped as ##, so one level survives -F set-time evaluation.
set -gF window-status-current-format "##{?pane_synchronized,#[fg=#{@orange}##,bold],#[fg=#{@cyan}##,bold]}#{@opt_window_current_number}:#{@opt_window_current_text}#{@opt_window_flags}"
