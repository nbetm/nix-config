# Nord Deep Palette
set -gq @nord_base "#212732"
set -gq @nord_surface "#2e3440"
set -gq @nord_elevated "#3b4252"
set -gq @nord_chrome "#434c5e"
set -gq @nord_dim "#798094"
set -gq @nord_text "#b8c5d1"
set -gq @nord_bright "#d4dce6"
set -gq @nord_aqua "#8fbcbb"
set -gq @nord_cyan "#88c0d0"
set -gq @nord_blue "#81a1c1"
set -gq @nord_navy "#5e81ac"
set -gq @nord_red "#bf616a"
set -gq @nord_orange "#d08770"
set -gq @nord_yellow "#ebcb8b"
set -gq @nord_green "#a3be8c"
set -gq @nord_magenta "#b48ead"

# Session module: <session> — name text fg normally, yellow when prefix held.
# Conditional at format level (tmux doesn't evaluate #{?...} inside style attribute values).
set -gF @opt_status_session "##{?client_prefix,#[fg=#{@nord_yellow}],#[fg=#{@nord_text}]}##S "

# Time module: Wed May 6 19:22
set -gF @opt_status_time "#[fg=#{@nord_text}] %a %b %-d %H:%M"

set -gF status-style "fg=#{@nord_text},bg=#{@nord_surface}"

# Message
set -gF message-style "fg=#{@nord_yellow},bg=#{@nord_surface},align=centre"
set -gF message-command-style "fg=#{@nord_yellow},bg=#{@nord_surface},align=centre"

# Panes
set -wgF pane-active-border-style "#{?pane_in_mode,fg=#{@nord_cyan},#{?pane_synchronized,fg=#{@nord_aqua},fg=#{@nord_cyan}}}"
set -wgF pane-border-style "fg=#{@nord_chrome}"
set -wgF display-panes-colour "#{@nord_dim}"
set -wgF display-panes-active-colour "#{@nord_cyan}"

# Popups & Menu (tmux 3.4+)
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "fg=#{@nord_text},bg=#{@nord_elevated}"
  set -gF popup-style "bg=#{@nord_base},fg=#{@nord_text}"
  set -gF popup-border-style "fg=#{@nord_chrome}"
%endif

# Copy mode
set -gF mode-style "bg=#{@nord_elevated}"

# Clock mode
set -gF clock-mode-colour "#{@nord_navy}"

# Activity/bell styles — explicitly neutralized (the persistent yellow icon does the signaling;
# without these, tmux retains a previously-set style across re-sources)
set -gF window-status-activity-style "fg=default,bg=default,noreverse,nounderscore"
set -gF window-status-bell-style "fg=default,bg=default,noreverse,nounderscore"

# Window flags — no style override, icons inherit fg from the surrounding window-status
# format (text on inactive, cyan/orange on active). Icon shape carries the signal.
set -gqF @opt_window_flags "##{?window_activity_flag, 󱅫,}"
set -agqF @opt_window_flags "##{?window_bell_flag, 󰂞,}"
set -agqF @opt_window_flags "##{?window_silence_flag, 󰂛,}"
set -agqF @opt_window_flags "##{?window_last_flag, 󰁯,}"
set -agqF @opt_window_flags "##{?window_marked_flag, 󰃀,}"
set -agqF @opt_window_flags "##{?window_zoomed_flag, 󰁌,}"

# Window content tokens
set -gq @opt_window_text " #W"
set -gq @opt_window_number "#I"
set -gq @opt_window_current_text " #W"
set -gq @opt_window_current_number "#I"

# Window status separator — dim dotted vertical with surrounding spaces
set -gF window-status-separator "#[fg=#{@nord_dim}] ┊ "

# Inactive window: text fg
set -gF window-status-format "#[fg=#{@nord_text}]#{@opt_window_number}·#{@opt_window_text}#{@opt_window_flags}"

# Active window: cyan fg + bold (orange when panes synchronized)
# Conditional at format level — same reason as session module above.
# Inner commas in #[] escaped as ##, so one level survives -F set-time evaluation.
set -gF window-status-current-format "##{?pane_synchronized,#[fg=#{@nord_orange}##,bold],#[fg=#{@nord_cyan}##,bold]}#{@opt_window_current_number}·#{@opt_window_current_text}#{@opt_window_flags}"
